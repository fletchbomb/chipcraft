<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chipcraft Battle Test v0.9.3 Local</title>
<style>
:root{
  --bg:#0d1117;
  --panel:#131922;
  --panel2:#171f2b;
  --line:#273244;
  --text:#e8edf5;
  --muted:#97a5b8;
  --accent:#69b2ff;
  --legal:#141c29;
  --illegal:#0b0f15;
  --chip:#263247;
  --chipBorder:#41516d;
  --red:#ff6b6b;
  --blue:#6daeff;
  --green:#7ad87e;
  --piece-size:72px;
  --gap-size:8px;
  --panel-pad:12px;
  --flyout-h:172px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,sans-serif}
body{overflow:hidden}
button,select{font:inherit}
button,select{
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--line);
  border-radius:12px;
  padding:10px 12px;
}
button{cursor:pointer}
button:hover:not(:disabled){border-color:var(--accent)}
button:disabled{opacity:.45;cursor:not-allowed}
button.primary{border-color:var(--accent);box-shadow:0 0 0 1px rgba(105,178,255,.16)}
.app{height:100vh;display:grid;grid-template-rows:auto 1fr;min-height:0}
.topBar{border-bottom:1px solid var(--line);background:rgba(8,11,16,.92);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.topBarLeft,.topBarRight{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.main{display:grid;grid-template-columns:minmax(360px,1.15fr) minmax(260px,.85fr);gap:14px;padding:14px;min-height:0}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:var(--panel-pad);box-shadow:0 12px 36px rgba(0,0,0,.22);min-height:0}
.shipPanel{display:grid;grid-template-rows:auto 1fr;min-height:0}
.inventoryPanel{display:grid;grid-template-rows:auto 1fr auto;min-height:0;position:relative}
.panelHeader{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.panelHeader h2,.flyout h3,.inventoryHeader h2{margin:0}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.frameGridWrap{display:grid;min-height:0;place-items:center}
.frameGrid{display:grid;gap:var(--gap-size);justify-content:center;align-content:center;padding:10px;border-radius:18px;background:#090d13;border:1px solid #1d2634}
.space{width:var(--piece-size);height:var(--piece-size);background:var(--illegal);border:1px solid transparent;border-radius:16px;position:relative;transition:border-color .12s ease, box-shadow .12s ease, background .12s ease, transform .12s ease}
.space.legal{background:var(--legal);border-color:#1d2737}
.space.lockedSpace{opacity:.82}
.space .coord{position:absolute;left:4px;top:3px;font-size:8px;color:#4e617b;pointer-events:none}
.space.drop-eligible{cursor:pointer}
.space.drop-target{border-color:var(--accent);box-shadow:inset 0 0 0 2px rgba(105,178,255,.28)}
.inventoryHeader{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:10px}
.inventoryScroll{min-height:0;overflow:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--piece-size), var(--piece-size)));justify-content:start;gap:var(--gap-size);padding-right:4px;padding-bottom:calc(var(--flyout-h) + 10px);align-content:start}
.chipTile{width:var(--piece-size);height:var(--piece-size);border-radius:14px;background:var(--chip);border:1px solid var(--chipBorder);padding:4px;display:grid;grid-template-rows:auto 1fr auto;gap:3px;cursor:grab;text-align:center;user-select:none;transition:transform .1s ease,border-color .12s ease,box-shadow .12s ease}
.chipTile:hover,.chipTile.selected,.chipTile.focusedPlaced{border-color:var(--accent)}
.chipTile:active{transform:scale(.985)}
.chipTile.placed{position:absolute;inset:0;width:auto;height:auto;border-radius:16px;padding:0;grid-template-rows:auto 1fr auto}
.chipTile.dragging{opacity:.55}
.chipTile.readonly{cursor:default}
.chipTile.powered{box-shadow:0 0 0 1px rgba(255,255,255,.05),0 0 18px rgba(105,178,255,.18)}
.chipTile.red{box-shadow:0 0 0 1px rgba(255,107,107,.24),0 0 14px rgba(255,107,107,.18)}
.chipTile.blue{box-shadow:0 0 0 1px rgba(109,174,255,.24),0 0 14px rgba(109,174,255,.18)}
.chipTile.green{box-shadow:0 0 0 1px rgba(122,216,126,.24),0 0 14px rgba(122,216,126,.18)}
.chipTile.rgb{box-shadow:0 0 0 1px rgba(255,255,255,.24),0 0 16px rgba(255,255,255,.18)}
.chipName{font-size:clamp(7px, calc(var(--piece-size) * 0.11), 10px);line-height:1.05;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chipEmoji{font-size:clamp(16px, calc(var(--piece-size) * 0.34), 34px);display:grid;place-items:center;line-height:1}
.chipStats{display:flex;justify-content:space-between;align-items:center;font-size:clamp(8px, calc(var(--piece-size) * 0.13), 12px)}
.dots{display:flex;gap:3px}
.dot{width:7px;height:7px;border-radius:999px;background:#49586b}
.dot.red{background:var(--red)}
.dot.blue{background:var(--blue)}
.dot.green{background:var(--green)}
.flyout{border:1px solid var(--line);background:#101722;border-radius:16px;padding:12px;min-height:var(--flyout-h);position:absolute;left:0;right:0;bottom:0;display:grid;gap:8px}
.flyout .section{display:grid;gap:6px}
.flyoutLine{font-size:13px}
.small{font-size:12px}
.muted{color:var(--muted)}
.validationNote{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.validationNote.invalid{color:#ffb4b4}
.validationNote.valid{color:#b8f3c0}
.flyoutHeader{display:flex;align-items:center;justify-content:space-between;gap:8px}
.flyoutTitleWrap{display:flex;align-items:center;gap:8px;min-width:0}
.flyoutTitleWrap h3{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.flyoutGhostButton{padding:6px 10px;border-radius:10px;font-size:12px;background:rgba(255,255,255,.03)}

.battleTopBar{flex-wrap:nowrap;overflow:hidden}
.battleTopBar .topBarLeft,.battleTopBar .topBarRight{flex-wrap:nowrap}
.battleTopBar .topBarRight{justify-content:flex-end;min-width:0}
.battleHudCenter{display:flex;align-items:center;gap:10px;justify-content:center;flex:1;min-width:0;overflow:hidden}
.hudPill{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel2);font-size:12px;white-space:nowrap}
.hudTicker{max-width:300px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.readinessStrip{display:flex;gap:6px;align-items:center;flex-wrap:nowrap;min-width:0}
.readinessChip{min-width:28px;height:28px;border:1px solid var(--line);border-radius:10px;display:grid;place-items:center;background:var(--panel2);font-size:14px}
.readinessChip.spent{opacity:.4}
.battleScene{position:relative;min-height:0;overflow:hidden;padding:18px 18px calc(var(--flyout-h) + 34px);background:radial-gradient(circle at 50% 45%, rgba(42,61,90,.22), rgba(12,16,22,.08) 40%, rgba(13,17,23,0) 70%),linear-gradient(180deg, rgba(8,11,16,.94), rgba(13,17,23,1))}
.battleField{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);align-items:center;gap:42px;min-height:100%;position:relative}
.battleSide{position:relative;display:grid;align-items:center;min-height:0}
.battleSide.player{justify-items:start;padding-left:8px}
.battleSide.enemy{justify-items:end;padding-right:8px}
.battleShipBoard{position:relative;padding:18px 20px;display:grid;place-items:center;min-height:0}
.battleShipBoard::before{content:'';position:absolute;inset:8px;border-radius:40px;background:radial-gradient(circle at center, rgba(34,50,76,.20), rgba(13,17,23,0) 68%);pointer-events:none}
.battleShipBoard.playerFacing::before{background:radial-gradient(circle at 35% 50%, rgba(54,84,124,.18), rgba(13,17,23,0) 68%)}
.battleShipBoard.enemyFacing::before{background:radial-gradient(circle at 65% 50%, rgba(90,50,54,.14), rgba(13,17,23,0) 68%)}
.battleFrameGrid{background:transparent;border:0;padding:0;position:relative;z-index:1}
.battleShipBoard.enemyFacing .battleFrameGrid{transform:none}
.battleShipBoard.enemyFacing .battleFrameGrid .chipTile{transform:none}
.battleShipBoard.enemyFacing .battleFrameGrid .chipTile:active{transform:scale(.985)}
.battleSpace{background:rgba(11,15,21,.26);border-color:rgba(39,50,68,.28)}
.battleSpace.legal{background:rgba(20,28,41,.34);border-color:rgba(39,50,68,.38)}
.space.targetable{border-color:var(--accent);box-shadow:inset 0 0 0 2px rgba(105,178,255,.24)}
.space.previewTarget{border-color:#ffd166;box-shadow:inset 0 0 0 2px rgba(255,209,102,.32)}
.space.previewAffected{box-shadow:inset 0 0 0 2px rgba(122,216,126,.18)}
.space.committedTarget{box-shadow:inset 0 0 0 2px rgba(255,107,107,.24)}
.chipTile.ready{box-shadow:0 0 0 1px rgba(105,178,255,.22),0 0 20px rgba(105,178,255,.22)}
.chipTile.targetable{cursor:pointer}
.chipTile.disabled{opacity:.45;filter:saturate(.6)}
.chipTile.previewTarget{border-color:#ffd166}
.chipTile.committedTarget{border-color:var(--red)}
.battleChipFace{width:100%;height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:2px;padding:4px}
.battleChipStats{display:flex;justify-content:space-between;align-items:center;font-size:11px;line-height:1}
.statusRow{display:flex;gap:4px;justify-content:center;flex-wrap:wrap}
.statusPill{padding:2px 6px;border-radius:999px;border:1px solid var(--line);font-size:10px;background:rgba(255,255,255,.03)}
.battleOverlayFlyout{position:absolute;bottom:18px;z-index:24;width:min(320px, calc(50% - 32px));pointer-events:auto}
.battleOverlayFlyout.playerFlyout{left:18px}
.battleOverlayFlyout.enemyFlyout{right:18px}
.battleFlyout{border:1px solid var(--line);background:rgba(16,23,34,.96);border-radius:16px;padding:12px;min-height:176px;display:grid;gap:8px;box-shadow:0 18px 40px rgba(0,0,0,.28)}
.flyoutActions{display:flex;gap:8px;flex-wrap:wrap}
.previewList{display:grid;gap:4px}
.previewLine{font-size:12px}
.logDropdown{position:absolute;top:54px;left:14px;right:14px;max-height:25vh;overflow:auto;border:1px solid var(--line);background:#101722;border-radius:16px;padding:10px;z-index:30;display:grid;gap:6px}
.battlePlaybackBadge{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.03);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.overlayBackdrop{position:fixed;inset:0;background:rgba(4,7,11,.72);backdrop-filter:blur(4px);z-index:80;display:grid;place-items:center;padding:20px}
.overlayCard{width:min(720px, 92vw);max-height:min(78vh, 720px);overflow:hidden;display:grid;grid-template-rows:auto 1fr auto;border:1px solid var(--line);background:#101722;border-radius:20px;box-shadow:0 24px 56px rgba(0,0,0,.38)}
.overlayHeader{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.overlayHeader h3{margin:0;font-size:16px}
.overlayBody{overflow:auto;padding:14px 16px;display:grid;gap:10px}
.overlayBody .overlayLine{font-size:13px;line-height:1.35}
.overlayFooter{padding:12px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
.battleWinner{font-size:16px;font-weight:700}

@media (max-width: 820px){
  .main{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) minmax(0,1fr)}
  .inventoryScroll{padding-bottom:0}
  .flyout{position:static}
  .battleScene{padding-bottom:18px;overflow:visible}
  .battleField{grid-template-columns:1fr;gap:18px}
  .battleSide.enemy,.battleSide.player{justify-items:start;padding-left:8px;padding-right:0}
  .battleOverlayFlyout{position:static;width:auto;margin-top:12px}
  body{overflow:auto}
  .app{height:auto;min-height:100vh}
  .topBar{padding:8px 12px}
  .battleTopBar{flex-wrap:wrap}
}
</style>
</head>
<body>
<div id="app"></div>
<script>

function createSideSetupFromSerializable(savedSideSetup, sideKey){
  const fallback = sideKey === 'player'
    ? createEmptySideSetup({ frameId:'scout', aiPresetId:null })
    : createEmptySideSetup({ frameId:'scout', aiPresetId:AI_PRESETS[0].id });

  sideSetup.frameId = typeof savedSideSetup.frameId === 'string' ? savedSideSetup.frameId : sideSetup.frameId;
  sideSetup.builtChipInstances = Array.isArray(savedSideSetup.builtChipInstances)

    ? Object.fromEntries(Object.entries(savedSideSetup.placedLayoutBySpaceId).map(([spaceId, chipInstanceId]) => [String(spaceId), String(chipInstanceId)]))
    : {};
  sideSetup.aiPresetId = sideKey === 'enemy'

    placedLayoutBySpaceId: deepClone(sideSetup.placedLayoutBySpaceId),

function getSavedScenarioCompatibilityIssues(savedScenario){
  const issues = [];
  if(!savedScenario || typeof savedScenario !== 'object'){
    issues.push('Saved scenario payload is missing or invalid.');
    return issues;
  }
  const sideEntries = [
    ['player', savedScenario.playerSetup, false],
    ['enemy', savedScenario.enemySetup, true]
  ];
  for(const [sideKey, sideSetup, requiresAiPreset] of sideEntries){
    if(!sideSetup || typeof sideSetup !== 'object'){
      issues.push(getSideLabel(sideKey) + ' setup is missing.');
      continue;
    }
    if(!getFrameDef(sideSetup.frameId)) issues.push(getSideLabel(sideKey) + ' frame is missing: ' + sideSetup.frameId + '.');
    const builtIds = new Set();
    const builtChipInstances = Array.isArray(sideSetup.builtChipInstances) ? sideSetup.builtChipInstances : [];
    for(const builtInstance of builtChipInstances){
      if(!builtInstance || typeof builtInstance !== 'object'){
        issues.push(getSideLabel(sideKey) + ' built chip entry is invalid.');
        continue;
      }
      const chipInstanceId = String(builtInstance.chipInstanceId || '');
      const chipTypeId = String(builtInstance.chipTypeId || '');
      if(!chipInstanceId) issues.push(getSideLabel(sideKey) + ' built chip entry is missing chipInstanceId.');
      if(builtIds.has(chipInstanceId)) issues.push(getSideLabel(sideKey) + ' has duplicate chip instance id: ' + chipInstanceId + '.');
      builtIds.add(chipInstanceId);
      if(!getChipDef(chipTypeId)) issues.push(getSideLabel(sideKey) + ' references missing chip definition: ' + chipTypeId + '.');
    }
    const placedLayoutBySpaceId = sideSetup.placedLayoutBySpaceId && typeof sideSetup.placedLayoutBySpaceId === 'object' ? sideSetup.placedLayoutBySpaceId : {};
    for(const [spaceId, chipInstanceId] of Object.entries(placedLayoutBySpaceId)){
      if(!builtIds.has(String(chipInstanceId))) issues.push(getSideLabel(sideKey) + ' placed layout references missing chip instance: ' + chipInstanceId + '.');
      const frameLegalSpaces = getLegalSpaceIds(sideSetup.frameId);
      if(frameLegalSpaces.size && !frameLegalSpaces.has(String(spaceId))) issues.push(getSideLabel(sideKey) + ' placed layout references illegal space: ' + spaceId + '.');
    }
    if(requiresAiPreset && !getAiPreset(sideSetup.aiPresetId)) issues.push('Enemy AI preset is missing: ' + sideSetup.aiPresetId + '.');
  }
  return issues;
}
function loadStoredScenarioCollection(){
  try{
    const raw = window.localStorage.getItem(SCENARIO_STORAGE_KEY);
    if(!raw) return { ok:true, collection:{ formatVersion:SAVE_FORMAT_VERSION, scenarios:[] } };
    const parsed = JSON.parse(raw);
    if(!parsed || typeof parsed !== 'object') return { ok:false, reason:'Saved scenario data is corrupted.' };
    if(parsed.formatVersion !== SAVE_FORMAT_VERSION) return { ok:false, reason:'Saved scenario data uses an incompatible save format.' };
    if(!Array.isArray(parsed.scenarios)) return { ok:false, reason:'Saved scenario data is missing the scenario list.' };
    return { ok:true, collection:parsed };
  }catch(error){
    return { ok:false, reason:'Saved scenario data could not be read.' };
  }
}
function persistStoredScenarioCollection(collection){
  window.localStorage.setItem(SCENARIO_STORAGE_KEY, JSON.stringify(collection));
  return { ok:true };
}
function saveScenarioToStorage(scenario){
  const loadResult = loadStoredScenarioCollection();
  if(!loadResult.ok) return loadResult;
  const collection = loadResult.collection;
  const serialized = serializeScenarioForSave(scenario);
  const existingIndex = collection.scenarios.findIndex(entry => entry && entry.name === serialized.name);
  if(existingIndex >= 0) collection.scenarios[existingIndex] = serialized;
  else collection.scenarios.push(serialized);
  persistStoredScenarioCollection(collection);
  return { ok:true, savedScenario:serialized, replaced:existingIndex >= 0 };
}
function syncIdCountersFromScenario(scenario){
  if(!scenario || typeof scenario !== 'object') return;
  const scenarioMatch = String(scenario.scenarioId || '').match(/(\d+)$/);
  if(scenarioMatch) nextScenarioNumber = Math.max(nextScenarioNumber, Number(scenarioMatch[1]));
  for(const sideSetup of [scenario.playerSetup, scenario.enemySetup]){
    if(!sideSetup || !Array.isArray(sideSetup.builtChipInstances)) continue;
    for(const builtInstance of sideSetup.builtChipInstances){
      const match = String(builtInstance.chipInstanceId || '').match(/__(\d+)$/);
      if(match) nextChipInstanceNumber = Math.max(nextChipInstanceNumber, Number(match[1]));
    }
  }
}

function parseSpaceId(spaceId){
  const parts = spaceId.split(',').map(Number);
  return { x:parts[0], y:parts[1] };
}

  const frame = getFrameDef(frameId);
  return new Set(frame ? frame.legalSpaces : []);
}
function getFrameGrid(frameId){
  const frame = getFrameDef(frameId);
  if(!frame) return { cols:0, rows:0, legal:new Set(), cells:[] };
  const legal = getLegalSpaceIds(frameId);
  const cells = [];
  for(let y = 0; y < frame.rows; y += 1){
    for(let x = 0; x < frame.cols; x += 1){
      const id = makeSpaceId(x, y);
      cells.push({ id, x, y, legal:legal.has(id) });
    }
  }
  return { cols:frame.cols, rows:frame.rows, legal, cells };
}
function getAdjacentSpaceIds(spaceId, mode){
  const point = parseSpaceId(spaceId);
  const orthogonal = [
    makeSpaceId(point.x + 1, point.y),
    makeSpaceId(point.x - 1, point.y),
    makeSpaceId(point.x, point.y + 1),
    makeSpaceId(point.x, point.y - 1)
  ];
  if(mode === 'orthogonal') return orthogonal;
  const out = [];
  for(let dy = -1; dy <= 1; dy += 1){
    for(let dx = -1; dx <= 1; dx += 1){
      if(dx === 0 && dy === 0) continue;
      out.push(makeSpaceId(point.x + dx, point.y + dy));
    }
  }
  return out;
}
function getCombatCoordsForSpace(sideKey, frameId, spaceId){
  const frame = getFrameDef(frameId);
  const local = parseSpaceId(spaceId);
  if(!frame) return local;
  if(sideKey === 'player') return { x:local.y, y:local.x };
  return { x:local.y, y:(frame.cols - 1) - local.x };
}
function getLocalCoordsFromCombat(sideKey, frameId, combatPoint){
  const frame = getFrameDef(frameId);
  if(!frame) return { x:combatPoint.x, y:combatPoint.y };
  if(sideKey === 'player') return { x:combatPoint.y, y:combatPoint.x };
  return { x:(frame.cols - 1) - combatPoint.y, y:combatPoint.x };
}
function getBattleDisplayDimensions(frameId){

  if(!frame) return { cols:0, rows:0 };

}
function getLocalSpaceIdFromBattleDisplayPoint(sideKey, frameId, displayPoint){
  const dims = getBattleDisplayDimensions(frameId);
  const combatPoint = sideKey === 'player'
    ? { x:(dims.cols - 1) - displayPoint.x, y:displayPoint.y }
    : { x:displayPoint.x, y:displayPoint.y };

function getBattleDisplayGrid(sideKey, frameId){
  const dims = getBattleDisplayDimensions(frameId);

function getShapeOffsets(shape){
  if(!shape) return [{ x:0, y:0 }];
  const size = Math.max(1, shape.size || 1);
  const offsets = [];
  const push = (x, y) => offsets.push({ x, y });
  switch(shape.family){
    case 'Dot':
      for(let y = 0; y < size; y += 1){
        for(let x = 0; x < size; x += 1){ push(x, y); }
      }
      break;
    case 'Cross':
      push(0, 0);
      for(let i = 1; i <= size; i += 1){
        push(i, 0); push(-i, 0); push(0, i); push(0, -i);
      }
      break;
    case 'Diagonal':
      push(0, 0);
      for(let i = 1; i <= size; i += 1){
        push(i, i); push(i, -i); push(-i, i); push(-i, -i);
      }
      break;
    case 'Radial':
      for(let y = -size; y <= size; y += 1){
        for(let x = -size; x <= size; x += 1){
          if(Math.max(Math.abs(x), Math.abs(y)) <= size) push(x, y);
        }
      }
      break;
    case 'Spike':
      for(let x = 0; x <= size; x += 1) push(x, 0);
      break;
    case 'Fan':
      for(let x = 0; x <= size; x += 1){
        const yMax = size - x;
        for(let y = -yMax; y <= yMax; y += 1) push(x, y);
      }
      break;
    default:
      push(0, 0);
      break;
  }
  const deduped = new Map();
  for(const offset of offsets) deduped.set(offset.x + ',' + offset.y, offset);
  return Array.from(deduped.values());
}
function getAffectedSpaceIdsFromTarget(sideKey, frameId, targetSpaceId, shape){
  if(!targetSpaceId || !shape) return targetSpaceId ? [targetSpaceId] : [];
  const legal = getLegalSpaceIds(frameId);
  const targetCombat = getCombatCoordsForSpace(sideKey, frameId, targetSpaceId);
  const affected = [];
  for(const offset of getShapeOffsets(shape)){
    const combatPoint = { x:targetCombat.x + offset.x, y:targetCombat.y + offset.y };
    const localPoint = getLocalCoordsFromCombat(sideKey, frameId, combatPoint);
    const localSpaceId = makeSpaceId(localPoint.x, localPoint.y);
    if(legal.has(localSpaceId)) affected.push(localSpaceId);
  }
  return affected;
}
function getOccupancyBySpaceId(sideStateLike){
  if(!sideStateLike) return {};
  if(sideStateLike.placedLayoutBySpaceId) return Object.assign({}, sideStateLike.placedLayoutBySpaceId);
  const out = {};
  const chipsById = sideStateLike.chipsById || {};
  for(const chipState of Object.values(chipsById)){
    if(!chipState || chipState.isDisabled || !chipState.spaceId) continue;
    out[chipState.spaceId] = chipState.chipInstanceId;
  }
  return out;
}
function getDisabledHoleSpaceIds(sideStateLike){
  const out = new Set();
  if(!sideStateLike || !sideStateLike.chipsById) return out;
  for(const chipState of Object.values(sideStateLike.chipsById)){
    if(!chipState || !chipState.spaceId || !chipState.isDisabled) continue;
    out.add(chipState.spaceId);
  }
  return out;
}
function getLaneIdForCombatPoint(combatPoint){
  return String(combatPoint.y);
}
function getFrontierSpaceIds(attackerSideKey, defenderStateLike){
  if(!defenderStateLike) return [];
  const defenderSideKey = defenderStateLike.sideKey || (attackerSideKey === 'player' ? 'enemy' : 'player');
  const occupied = getOccupancyBySpaceId(defenderStateLike);
  const disabledHoles = getDisabledHoleSpaceIds(defenderStateLike);
  const occupiedEntries = Object.entries(occupied).map(([spaceId, chipInstanceId]) => ({
    spaceId,
    chipInstanceId,
    combat:getCombatCoordsForSpace(defenderSideKey, defenderStateLike.frameId, spaceId)
  }));
  if(!occupiedEntries.length) return [];

  const occupiedByCombatKey = new Map();
  const entriesByLaneId = new Map();
  for(const entry of occupiedEntries){
    occupiedByCombatKey.set(makeSpaceId(entry.combat.x, entry.combat.y), entry);
    const laneId = getLaneIdForCombatPoint(entry.combat);
    if(!entriesByLaneId.has(laneId)) entriesByLaneId.set(laneId, []);
    entriesByLaneId.get(laneId).push(entry);
  }

  const frontierLocal = new Set();
  for(const laneEntries of entriesByLaneId.values()){
    const forwardMostX = Math.min(...laneEntries.map(entry => entry.combat.x));
    for(const entry of laneEntries){
      if(entry.combat.x === forwardMostX) frontierLocal.add(entry.spaceId);
    }
  }

  for(const holeSpaceId of disabledHoles){
    const holeCombat = getCombatCoordsForSpace(defenderSideKey, defenderStateLike.frameId, holeSpaceId);
    for(const offset of [{ x:-1, y:0 }, { x:1, y:0 }, { x:0, y:-1 }, { x:0, y:1 }]){
      const occupiedEntry = occupiedByCombatKey.get(makeSpaceId(holeCombat.x + offset.x, holeCombat.y + offset.y));
      if(occupiedEntry) frontierLocal.add(occupiedEntry.spaceId);
    }
  }

  return Array.from(frontierLocal);
}
function isFrontierSpace(attackerSideKey, defenderStateLike, spaceId){
  return getFrontierSpaceIds(attackerSideKey, defenderStateLike).includes(spaceId);
}
function getDefaultHostileTargetChipIds(attackerSideKey, defenderStateLike){
  const occupied = getOccupancyBySpaceId(defenderStateLike);
  return getFrontierSpaceIds(attackerSideKey, defenderStateLike)
    .map(spaceId => occupied[spaceId])
    .filter(Boolean);
}

function getBuiltInstanceById(sideSetup, chipInstanceId){
  return sideSetup.builtChipInstances.find(instance => instance.chipInstanceId === chipInstanceId) || null;
}
function getSpaceForChipInstance(sideSetup, chipInstanceId){
  for(const [spaceId, placedChipInstanceId] of Object.entries(sideSetup.placedLayoutBySpaceId)){
    if(placedChipInstanceId === chipInstanceId) return spaceId;
  }
  return null;
}
function getPlacedEntries(sideSetup){
  return Object.entries(sideSetup.placedLayoutBySpaceId)
    .map(([spaceId, chipInstanceId]) => ({ spaceId, chipInstanceId, builtInstance:getBuiltInstanceById(sideSetup, chipInstanceId) }))
    .filter(entry => entry.builtInstance)
    .map(entry => Object.assign({}, entry, { chipDef:getChipDef(entry.builtInstance.chipTypeId) }))
    .filter(entry => entry.chipDef);
}
function addBuiltInstanceToSide(sideSetup, chipTypeId){
  const builtInstance = createBuiltChipInstance(chipTypeId);
  sideSetup.builtChipInstances.push(builtInstance);
  return builtInstance;
}
function removeChipInstanceFromLayout(sideSetup, chipInstanceId){
  const currentSpaceId = getSpaceForChipInstance(sideSetup, chipInstanceId);
  if(currentSpaceId) delete sideSetup.placedLayoutBySpaceId[currentSpaceId];
}
function canDropOnSpace(sideSetup, dragPayload, spaceId){
  const legalSpaces = getLegalSpaceIds(sideSetup.frameId);
  if(!legalSpaces.has(spaceId)) return false;
  const occupiedBy = sideSetup.placedLayoutBySpaceId[spaceId] || null;
  if(!occupiedBy) return true;
  if(dragPayload && dragPayload.kind === 'placed' && occupiedBy === dragPayload.chipInstanceId) return true;
  return false;
}
function placeChipInstance(sideSetup, chipInstanceId, targetSpaceId){
  if(!canDropOnSpace(sideSetup, { kind:'placed', chipInstanceId }, targetSpaceId)){
    return { ok:false, reason:'Target space is occupied or illegal.' };
  }
  removeChipInstanceFromLayout(sideSetup, chipInstanceId);
  sideSetup.placedLayoutBySpaceId[targetSpaceId] = chipInstanceId;
  return { ok:true };
}
function createAndPlaceChipInstance(sideSetup, chipTypeId, targetSpaceId){
  if(!canDropOnSpace(sideSetup, { kind:'catalog', chipTypeId }, targetSpaceId)){
    return { ok:false, reason:'Target space is occupied or illegal.' };
  }
  const builtInstance = addBuiltInstanceToSide(sideSetup, chipTypeId);
  sideSetup.placedLayoutBySpaceId[targetSpaceId] = builtInstance.chipInstanceId;
  return { ok:true, chipInstanceId:builtInstance.chipInstanceId };
}
function clearPlacedLayout(sideSetup){
  sideSetup.placedLayoutBySpaceId = {};
  sideSetup.isLocked = false;
}
function validateSideSetup(sideKey, sideSetup){
  const setup = sideSetup || getSideSetup(sideKey);
  const reasons = [];
  const warnings = [];
  const frameDef = getFrameDef(setup.frameId);
  const legalSpaces = getLegalSpaceIds(setup.frameId);
  const builtIds = new Set();
  const placedInstanceCounts = {};
  const placedEntries = Object.entries(setup.placedLayoutBySpaceId);
  let coreCount = 0;

  if(!frameDef) reasons.push('Missing frame selection.');

  for(const builtInstance of setup.builtChipInstances){
    if(builtIds.has(builtInstance.chipInstanceId)){
      reasons.push('Duplicate chip instance id detected: ' + builtInstance.chipInstanceId + '.');
      continue;
    }
    builtIds.add(builtInstance.chipInstanceId);
    if(!getChipDef(builtInstance.chipTypeId)) reasons.push('Missing chip definition: ' + builtInstance.chipTypeId + '.');
  }

  for(const [spaceId, chipInstanceId] of placedEntries){
    if(!legalSpaces.has(spaceId)) reasons.push('Illegal occupied space: ' + spaceId + '.');
    if(!builtIds.has(chipInstanceId)) reasons.push('Placed layout references missing chip instance: ' + chipInstanceId + '.');
    placedInstanceCounts[chipInstanceId] = (placedInstanceCounts[chipInstanceId] || 0) + 1;
    const builtInstance = getBuiltInstanceById(setup, chipInstanceId);
    const chipDef = builtInstance ? getChipDef(builtInstance.chipTypeId) : null;
    if(chipDef && chipDef.isCore) coreCount += 1;
  }

  for(const [chipInstanceId, count] of Object.entries(placedInstanceCounts)){
    if(count > 1) reasons.push('Chip instance placed in more than one space: ' + chipInstanceId + '.');
  }

  if(coreCount === 0) reasons.push('Missing Core placement.');
  if(coreCount > 1) reasons.push('Only 1 placed Core is allowed.');
  if(sideKey === 'enemy' && !getAiPreset(setup.aiPresetId)) reasons.push('Enemy AI preset is required.');
  if(setup.builtChipInstances.length > Object.keys(setup.placedLayoutBySpaceId).length) warnings.push('This side has unplaced built instances.');

  return {
    sideKey,
    isValid: reasons.length === 0,
    reasons,
    warnings,
    stats: {
      frameId: setup.frameId,
      builtCount: setup.builtChipInstances.length,
      placedCount: Object.keys(setup.placedLayoutBySpaceId).length,
      coreCount,
      aiPresetId: setup.aiPresetId,
      isLocked: setup.isLocked
    }
  };
}
function validateLaunchScenario(){
  const playerValidation = validateSideSetup('player');
  const enemyValidation = validateSideSetup('enemy');
  const reasons = [];
  if(!playerValidation.isValid) reasons.push('Player setup is invalid.');
  if(!enemyValidation.isValid) reasons.push('Enemy setup is invalid.');
  if(!getSideSetup('player').isLocked) reasons.push('Player side is not locked.');
  if(!getSideSetup('enemy').isLocked) reasons.push('Enemy side is not locked.');
  return { isValid: reasons.length === 0, reasons, playerValidation, enemyValidation };
}

function getPylonCoverageByColor(sideKey, sideStateLike){
  const coverage = { red:new Set(), blue:new Set(), green:new Set() };
  const occupied = getOccupancyBySpaceId(sideStateLike);
  const entries = sideStateLike.placedLayoutBySpaceId ? getPlacedEntries(sideStateLike) : Object.values(sideStateLike.chipsById || {}).filter(chipState => !chipState.isDisabled).map(chipState => ({
    spaceId:chipState.spaceId,
    chipInstanceId:chipState.chipInstanceId,
    chipDef:getChipDef(chipState.chipTypeId)
  }));
  for(const entry of entries){
    if(!entry.chipDef || !entry.chipDef.isPylon) continue;
    const color = entry.chipDef.pylonColor;
    for(const spaceId of getAffectedSpaceIdsFromTarget(sideKey, sideStateLike.frameId, entry.spaceId, shapeSpec('Radial', 1))){
      if(occupied[spaceId]) coverage[color].add(spaceId);
    }
  }
  return coverage;
}
function propagateRelayColors(sideKey, sideStateLike, baseCoverage){
  const occupied = getOccupancyBySpaceId(sideStateLike);
  const relaySpaceIds = Object.keys(occupied).filter(spaceId => {
    const chipInstanceId = occupied[spaceId];
    const chipTypeId = sideStateLike.placedLayoutBySpaceId
      ? (getBuiltInstanceById(sideStateLike, chipInstanceId) || {}).chipTypeId
      : ((sideStateLike.chipsById || {})[chipInstanceId] || {}).chipTypeId;
    return chipTypeId === 'relay';
  });
  const colorsBySpaceId = {};
  for(const [color, spaces] of Object.entries(baseCoverage)){
    for(const spaceId of spaces){
      colorsBySpaceId[spaceId] = colorsBySpaceId[spaceId] || new Set();
      colorsBySpaceId[spaceId].add(color);
    }
  }
  let changed = true;
  while(changed){
    changed = false;
    for(const relaySpaceId of relaySpaceIds){
      const carried = colorsBySpaceId[relaySpaceId] || new Set();
      if(!carried.size) continue;
      for(const spaceId of getAffectedSpaceIdsFromTarget(sideKey, sideStateLike.frameId, relaySpaceId, shapeSpec('Cross', 1))){
        if(!occupied[spaceId]) continue;
        colorsBySpaceId[spaceId] = colorsBySpaceId[spaceId] || new Set();
        for(const color of carried){
          if(colorsBySpaceId[spaceId].has(color)) continue;
          colorsBySpaceId[spaceId].add(color);
          changed = true;
        }
      }
    }
  }
  return colorsBySpaceId;
}
function getFusionTagFromColors(colors){
  const sorted = Array.from(colors).sort().join(',');
  if(sorted === 'blue,green,red') return 'White';
  if(sorted === 'blue,green') return 'Cyan';
  if(sorted === 'green,red') return 'Yellow';
  if(sorted === 'blue,red') return 'Magenta';
  return null;
}
function buildPowerStateForSide(sideKey, sideStateLike){
  const occupied = getOccupancyBySpaceId(sideStateLike);
  const baseCoverage = getPylonCoverageByColor(sideKey, sideStateLike);
  const colorsBySpaceIdMap = propagateRelayColors(sideKey, sideStateLike, baseCoverage);
  const colorsByChipId = {};
  const colorsBySpaceId = {};
  const levelsByChipId = {};
  const fusionByChipId = {};
  const modifiedByChipId = {};

  for(const [spaceId, chipInstanceId] of Object.entries(occupied)){
    const colors = Array.from(colorsBySpaceIdMap[spaceId] || []).sort();
    const levelValue = colors.length;
    const levels = {};
    for(const color of colors) levels[color] = levelValue;
    colorsBySpaceId[spaceId] = colors;
    colorsByChipId[chipInstanceId] = colors;
    levelsByChipId[chipInstanceId] = levels;
    fusionByChipId[chipInstanceId] = getFusionTagFromColors(colors);

    const chipTypeId = sideStateLike.placedLayoutBySpaceId
      ? ((getBuiltInstanceById(sideStateLike, chipInstanceId) || {}).chipTypeId)
      : ((sideStateLike.chipsById || {})[chipInstanceId] || {}).chipTypeId;
    const chipDef = getChipDef(chipTypeId);
    modifiedByChipId[chipInstanceId] = getModifiedChipStatsFromLevels(chipDef, levels);
  }

  return { sideKey, colorsByChipId, colorsBySpaceId, levelsByChipId, fusionByChipId, modifiedByChipId };
}
function getPowerColorsForChip(powerState, chipInstanceId){
  return powerState && powerState.colorsByChipId[chipInstanceId] ? powerState.colorsByChipId[chipInstanceId] : [];
}
function getPowerLevelsForChip(powerState, chipInstanceId){
  return powerState && powerState.levelsByChipId[chipInstanceId] ? powerState.levelsByChipId[chipInstanceId] : {};
}
function getFusionTagForChip(powerState, chipInstanceId){
  return powerState && powerState.fusionByChipId[chipInstanceId] ? powerState.fusionByChipId[chipInstanceId] : null;
}
function getModifiedChipStatsFromLevels(chipDef, levels){
  const redLevel = levels.red || 0;
  const blueLevel = levels.blue || 0;
  const greenLevel = levels.green || 0;
  const baseShape = getChipBattleShapeSpec(chipDef);
  return {
    currentMaxHp: chipDef.hp + greenLevel,
    primaryStatBonus: chipDef.primaryStat === PRIMARY_STATS.NONE ? 0 : redLevel,
    shapeStepBonus: baseShape ? blueLevel : 0,
    printedEnergy: chipDef.battle && typeof chipDef.battle.printedEnergy === 'number' ? chipDef.battle.printedEnergy : null,
    powered: Boolean(redLevel || blueLevel || greenLevel)
  };
}
function getModifiedChipStats(powerState, chipInstanceId, chipDef){
  if(powerState && powerState.modifiedByChipId[chipInstanceId]) return powerState.modifiedByChipId[chipInstanceId];
  return getModifiedChipStatsFromLevels(chipDef, {});
}

let nextStatusSequence = 1;
function getPrintedEnergyForCoreChip(chipDef){

}
function createCombatChipStateFromSetup(sideKey, sideSetup, chipInstanceId, powerState){
  const builtInstance = getBuiltInstanceById(sideSetup, chipInstanceId);
  const chipDef = builtInstance ? getChipDef(builtInstance.chipTypeId) : null;
  const spaceId = getSpaceForChipInstance(sideSetup, chipInstanceId);
  const modified = getModifiedChipStats(powerState, chipInstanceId, chipDef);
  return {
    chipInstanceId,
    chipTypeId: builtInstance.chipTypeId,
    sideKey,
    spaceId,
    printedHp: chipDef.hp,

    currentMaxHp: modified.currentMaxHp,
    shield: 0,

    powerColors: getPowerColorsForChip(powerState, chipInstanceId),
    powerLevels: getPowerLevelsForChip(powerState, chipInstanceId),

    primaryStatBonus: modified.primaryStatBonus,

function createCombatSideStateFromSetup(sideKey, sideSetup, powerState){

    const spaceId = getSpaceForChipInstance(sideSetup, builtInstance.chipInstanceId);
    if(!spaceId) continue;
    const chipState = createCombatChipStateFromSetup(sideKey, sideSetup, builtInstance.chipInstanceId, powerState);
    chipsById[chipState.chipInstanceId] = chipState;
    const chipDef = getChipDef(chipState.chipTypeId);
    if(chipDef && chipDef.isCore) coreChipInstanceId = chipState.chipInstanceId;
  }
  const coreChipDef = coreChipInstanceId ? getChipDef(chipsById[coreChipInstanceId].chipTypeId) : null;
  const maxEnergy = getPrintedEnergyForCoreChip(coreChipDef);
  return {
    sideKey,
    frameId: sideSetup.frameId,
    aiPresetId: sideSetup.aiPresetId,
    coreChipInstanceId,
    chipsById,
    maxEnergy,
    currentEnergy:0,
    powerState:powerState,
    committedPlan:null
  };
}
function initializeBattleFromLockedSnapshot(snapshot){

  const combatState = {
    version: APP_VERSION,

}
function getFreshCombatStateFromLockedSnapshot(snapshot){ return initializeBattleFromLockedSnapshot(snapshot); }
function getCombatSideState(combatState, sideKey){ return sideKey === 'player' ? combatState.playerState : combatState.enemyState; }
function getCombatChipState(combatState, chipInstanceId){
  return combatState.playerState.chipsById[chipInstanceId] || combatState.enemyState.chipsById[chipInstanceId] || null;
}
function getLiveCombatChipStates(combatState, sideKey){

}
function getStatusEntries(chipState, statusName){

}
function getStatusAmount(chipState, statusName){

}
function hasStatus(chipState, statusName){ return getStatusEntries(chipState, statusName).length > 0; }
function addStatusEntry(chipState, statusName, amount, meta){
  const defaults = { expiresOnTurnEndOf:null, appliedBySideKey:null, sequence:nextStatusSequence++ };
  const payload = Object.assign(defaults, meta || {});
  const stackable = !['Jammed', 'Overload'].includes(statusName);
  if(!stackable){
    chipState.statuses = chipState.statuses.filter(entry => entry.name !== statusName);
    if(amount > 0) chipState.statuses.push(Object.assign({ name:statusName, amount:amount || 1 }, payload));
    return;
  }
  chipState.statuses.push(Object.assign({ name:statusName, amount:amount || 1 }, payload));
}
function removeStatusEntries(chipState, statusName, removeAll){
  let removed = 0;
  const next = [];
  for(const entry of chipState.statuses){
    if(entry.name !== statusName){ next.push(entry); continue; }
    if(removeAll || removed === 0){ removed += 1; continue; }
    next.push(entry);
  }

function removeOldestNegativeStatus(chipState){

  if(!negatives.length) return null;
  negatives.sort((a, b) => a.sequence - b.sequence);
  const target = negatives[0];
  let removed = false;
  chipState.statuses = chipState.statuses.filter(entry => {
    if(removed) return true;
    if(entry.sequence === target.sequence){ removed = true; return false; }

function getShieldAmount(chipState){ return getStatusAmount(chipState, 'Shield'); }

function recomputeSideDerivedState(combatState, sideKey){

  let maxEnergy = 0;
  for(const chipState of Object.values(sideState.chipsById)){
    const chipDef = getChipDef(chipState.chipTypeId);
    const modified = getModifiedChipStats(powerState, chipState.chipInstanceId, chipDef);
    chipState.powerColors = getPowerColorsForChip(powerState, chipState.chipInstanceId);
    chipState.powerLevels = getPowerLevelsForChip(powerState, chipState.chipInstanceId);
    chipState.fusionTag = getFusionTagForChip(powerState, chipState.chipInstanceId);
    chipState.primaryStatBonus = modified.primaryStatBonus;
    chipState.shapeStepBonus = modified.shapeStepBonus;
    chipState.currentMaxHp = modified.currentMaxHp;

    .filter(Boolean)
    .sort((a, b) => {

      const bMissing = b.currentMaxHp - b.hp;

}

      const targetChipId = legalTargets[Math.floor(Math.random() * legalTargets.length)];
      const action = buildLegalActionObject(combatState, sideKey, chipState.chipInstanceId, targetChipId, []);
      resolveLegalAction(combatState, action, { suppressEnergySpend:true, suppressLogPrefix:true });

function finalizeTurnCleanup(combatState, actingSideKey){

  for(const chipState of Object.values(actingSideState.chipsById)){
    const chipDef = getChipDef(chipState.chipTypeId);
    if(chipDef && chipDef.id === 'beam') chipState.counters.beamCharge = chipState.hasActedThisTurn ? chipState.counters.beamCharge + 1 : 0;
    if(chipDef && chipDef.id === 'siege-gun' && chipState.hasActedThisTurn) chipState.counters.siege = Math.min(2, chipState.counters.siege + 1);
    removeStatusEntries(chipState, 'Jammed', true);
  }
  for(const chipState of Object.values(opposingSideState.chipsById)){
    const retained = [];
    for(const entry of chipState.statuses){
      if(entry.name === 'Shield' && entry.expiresOnTurnEndOf === actingSideKey) continue;
      if(entry.name === 'Shock' && entry.expiresOnTurnEndOf === actingSideKey){
        if((entry.amount || 0) > 1) retained.push(Object.assign({}, entry, { amount:entry.amount - 1 }));
        continue;
      }
      retained.push(entry);
    }
    chipState.statuses = retained;
  }
  for(const sideKey of ['player','enemy']){
    for(const chipState of Object.values(getCombatSideState(combatState, sideKey).chipsById)){
      removeStatusEntries(chipState, 'Mark', true);

function prepareNextPlayerRound(combatState){

function endPlayerTurnAndAdvance(combatState){

function getLiveChipIdsForSide(combatState, sideKey){

function getPowerStateForCombatSide(combatState, sideKey){ return getCombatSideState(combatState, sideKey).powerState; }

function getUsableActiveChipIds(combatState, actingSideKey){

function getLegalTargetChipIds(combatState, actingSideKey, actingChipId){

  if(!actingChipState || !targetChipState) return [];
  const targetSideKey = targetChipState.sideKey;

function doesChipMatchTargetFilter(combatState, actingSideKey, chipDef, candidateChipState, targetFilter, affectedSpaceId, actingChipState){

  const candidateDef = getChipDef(candidateChipState.chipTypeId);
  if(targetFilter === 'allied-affected') return candidateChipState.sideKey === actingSideKey;
  if(targetFilter === 'allied-attack-affected') return candidateChipState.sideKey === actingSideKey && candidateDef.category === CHIP_CATEGORIES.ATTACK;
  if(targetFilter === 'orthogonally-adjacent-allied-damaged'){

function getAffectedChipIdsForAction(combatState, actingSideKey, actingChipId, targetChipId){
  const actingChipState = getCombatChipState(combatState, actingChipId);
  if(!actingChipState) return [];
  const chipDef = getChipDef(actingChipState.chipTypeId);
  const affectedSpaceIds = getAffectedSpacesForAction(combatState, actingSideKey, actingChipId, targetChipId);
  const targetChipState = targetChipId ? getCombatChipState(combatState, targetChipId) : actingChipState;
  const affectedSideKey = targetChipState ? targetChipState.sideKey : actingSideKey;
  const sideState = getCombatSideState(combatState, affectedSideKey);
  const chipIds = [];
  for(const chipState of Object.values(sideState.chipsById)){
    if(chipState.isDisabled || !chipState.spaceId) continue;
    if(!affectedSpaceIds.includes(chipState.spaceId)) continue;
    if(!doesChipMatchTargetFilter(combatState, actingSideKey, chipDef, chipState, chipDef.battle.targetFilter, chipState.spaceId, actingChipState)) continue;

function getChosenRequirementForAction(chipDef){ return chipDef.battle.chosen || null; }
function getChosenCandidateChipIds(combatState, actingSideKey, actingChipId, targetChipId){

}
function getChosenChipCombinationList(combatState, actingSideKey, actingChipId, targetChipId){
  const actingChipState = getCombatChipState(combatState, actingChipId);
  const chipDef = actingChipState ? getChipDef(actingChipState.chipTypeId) : null;
  const requirement = chipDef ? getChosenRequirementForAction(chipDef) : null;
  if(!requirement) return [[]];
  const candidates = getChosenCandidateChipIds(combatState, actingSideKey, actingChipId, targetChipId);
  const combos = [];
  function choose(start, picked, targetCount){
    if(picked.length === targetCount){ combos.push(picked.slice()); return; }
    for(let index = start; index < candidates.length; index += 1){
      picked.push(candidates[index]);
      choose(index + 1, picked, targetCount);
      picked.pop();
    }
  }
  if(requirement.kind === 'upTo'){
    const max = Math.min(requirement.count, candidates.length);
    for(let count = 1; count <= max; count += 1) choose(0, [], count);
    if(!combos.length) combos.push([]);
    return combos;
  }

    if(candidates.length < requirement.count) return [];

    const chipDef = getChipDef(chipState.chipTypeId);
    if(!chipDef || chipDef.id !== 'scope') continue;
    const affectedIds = getAffectedChipIdsForAction(combatState, actingChipState.sideKey, chipState.chipInstanceId, chipState.chipInstanceId);

function isLegalActionCurrentlyUsable(combatState, legalAction){

  if(!actingChipState || actingChipState.isDisabled) return false;
  if(!getUsableActiveChipIds(combatState, actingChipState.sideKey).includes(legalAction.actingChipId)) return false;
  const legalTargets = getLegalTargetChipIds(combatState, actingChipState.sideKey, legalAction.actingChipId);
  if(!legalTargets.includes(legalAction.targetChipId)) return false;
  const allowedChosenKeys = new Set(getChosenChipCombinationList(combatState, actingChipState.sideKey, legalAction.actingChipId, legalAction.targetChipId).map(getChosenCombinationKey));

function getPowerStateSnapshotBySide(combatState, sideKey){

function computePowerDiff(beforeSnapshot, afterSnapshot){

  let powerChanged = false;
  const allIds = new Set([...Object.keys(beforeSnapshot), ...Object.keys(afterSnapshot)]);
  for(const chipId of allIds){
    const beforeColors = beforeSnapshot[chipId] || [];
    const afterColors = afterSnapshot[chipId] || [];
    if(beforeColors.join('|') !== afterColors.join('|')) powerChanged = true;
    if(!beforeColors.length && afterColors.length) newlyPoweredChipIds.push(chipId);
    if(beforeColors.length && !afterColors.length) newlyUnpoweredChipIds.push(chipId);

  const afterDefenderState = getCombatSideState(afterCombatState, affectedSideKey);
  const beforeTargets = getDefaultHostileTargetChipIds(actingSideKey, beforeDefenderState);
  const afterTargets = getDefaultHostileTargetChipIds(actingSideKey, afterDefenderState);
  resolution.frontierChanged = beforeTargets.slice().sort().join('|') !== afterTargets.slice().sort().join('|');
  resolution.newlyExposedChipIds = afterTargets.filter(chipId => !beforeTargets.includes(chipId));

  const beforePower = Object.assign({}, getPowerStateSnapshotBySide(beforeCombatState, 'player'), getPowerStateSnapshotBySide(beforeCombatState, 'enemy'));
  const afterPower = Object.assign({}, getPowerStateSnapshotBySide(afterCombatState, 'player'), getPowerStateSnapshotBySide(afterCombatState, 'enemy'));

  resolution.powerChanged = powerDiff.powerChanged;
  resolution.newlyPoweredChipIds = powerDiff.newlyPoweredChipIds;
  resolution.newlyUnpoweredChipIds = powerDiff.newlyUnpoweredChipIds;

  const protectedSideKey = resolution.actionKind === 'hostile' ? getEnemySideKey(actingSideKey) : actingSideKey;

    actingChipId,

function buildScoreProfile(projectedResolution, combatState, actingSideKey){

    const targetDef = targetState ? getChipDef(targetState.chipTypeId) : null;
    if(!targetDef) continue;
    if(targetDef.isCore) profile.projectedCoreDamage = normalizeScore(profile.projectedCoreDamage + packet.amount);
    if(targetDef.isPylon) profile.projectedPylonDamage = normalizeScore(profile.projectedPylonDamage + packet.amount);
    if(targetDef.id === 'relay') profile.projectedRelayDamage = normalizeScore(profile.projectedRelayDamage + packet.amount);
    if(targetDef.category === CHIP_CATEGORIES.ATTACK) profile.projectedAttackChipDamage = normalizeScore(profile.projectedAttackChipDamage + packet.amount);
    if(targetDef.category === CHIP_CATEGORIES.SUPPORT) profile.projectedSupportChipDamage = normalizeScore(profile.projectedSupportChipDamage + packet.amount);

  else profile.projectedDisablementValue = normalizeScore(disabledTargets.length);

  profile.projectedPoweredTargetDisruption = normalizeScore((projectedResolution.statusAdds || []).filter(item => item.statusName === 'Jammed').length + (projectedResolution.newlyUnpoweredChipIds || []).length + profile.projectedPylonDamage + profile.projectedRelayDamage);

function solvePieceSize(){
  const root = document.documentElement;
  const shipPanel = appState.mode === APP_MODES.BATTLE ? document.querySelector('.battleShipBoard.playerFacing') : document.querySelector('.shipPanel');
  if(!shipPanel) return;
  let gridCols;
  let gridRows;
  if(appState.mode === APP_MODES.BATTLE){
    const playerDims = getBattleDisplayDimensions(getCombatSideState(appState.combat, 'player').frameId);
    const enemyDims = getBattleDisplayDimensions(getCombatSideState(appState.combat, 'enemy').frameId);
    gridCols = Math.max(playerDims.cols, enemyDims.cols);
    gridRows = Math.max(playerDims.rows, enemyDims.rows);
  }else{
    const activeFrame = getFrameDef(getActiveSideSetup().frameId);
    if(!activeFrame) return;
    gridCols = activeFrame.cols;
    gridRows = activeFrame.rows;
  }
  const shipRect = shipPanel.getBoundingClientRect();
  const panelPad = 10;
  const headerHeight = appState.mode === APP_MODES.BATTLE ? 12 : 60;
  const boardPad = 20;
  const availWidth = Math.max(120, shipRect.width - panelPad * 2 - boardPad);
  const availHeight = Math.max(120, shipRect.height - headerHeight - panelPad * 2 - boardPad);
  const gap = 6;
  const widthFit = Math.floor((availWidth - gap * (gridCols - 1)) / gridCols);
  const heightFit = Math.floor((availHeight - gap * (gridRows - 1)) / gridRows);
  const desktop = window.innerWidth > 820;
  const minTouch = desktop ? 50 : 44;
  const maxSize = desktop ? 112 : 82;
  const solved = Math.max(minTouch, Math.min(maxSize, widthFit, heightFit));
  const flyoutHeight = desktop ? Math.min(180, Math.max(148, Math.round(solved * 2.05))) : 148;
  const panelPadding = desktop ? (solved >= 84 ? 14 : 10) : 10;
  root.style.setProperty('--piece-size', solved + 'px');
  root.style.setProperty('--gap-size', (solved >= 84 ? 10 : 6) + 'px');
  root.style.setProperty('--panel-pad', panelPadding + 'px');
  root.style.setProperty('--flyout-h', flyoutHeight + 'px');
}

function handleSaveScenario(){
  const nextName = window.prompt('Scenario name', appState.scenario.name || ('Battle Test ' + APP_VERSION));
  if(nextName === null) return;
  const trimmed = nextName.trim();
  if(!trimmed){
    alert('Scenario name is required.');
    return;
  }
  const existing = loadStoredScenarioCollection();
  if(!existing.ok){
    alert(existing.reason);
    return;
  }
  const willReplace = existing.collection.scenarios.some(entry => entry && entry.name === trimmed);
  if(willReplace && !window.confirm('Overwrite saved scenario "' + trimmed + '"?')) return;
  appState.scenario.name = trimmed;
  const result = saveScenarioToStorage(appState.scenario);
  if(!result.ok){
    alert(result.reason || 'Scenario could not be saved.');
    return;
  }
  alert('Saved scenario "' + trimmed + '".');
  renderApp();
}
function handleLoadScenario(){
  const loadResult = loadStoredScenarioCollection();
  if(!loadResult.ok){
    alert(loadResult.reason);
    return;
  }
  const savedScenarios = loadResult.collection.scenarios;
  if(!savedScenarios.length){
    alert('No saved scenarios found.');
    return;
  }
  const promptLines = ['Load scenario:'];
  savedScenarios.forEach((entry, index) => { promptLines.push((index + 1) + '. ' + entry.name); });
  const response = window.prompt(promptLines.join('\n'), '1');
  if(response === null) return;
  const trimmed = response.trim();
  if(!trimmed){
    alert('Load cancelled.');
    return;
  }
  let selected = null;
  const index = Number(trimmed);
  if(Number.isInteger(index) && index >= 1 && index <= savedScenarios.length) selected = savedScenarios[index - 1];
  if(!selected) selected = savedScenarios.find(entry => entry && entry.name === trimmed) || null;
  if(!selected){
    alert('Saved scenario not found.');
    return;
  }
  const loadScenarioResult = loadScenarioIntoSetup(selected);
  if(!loadScenarioResult.ok){
    alert(loadScenarioResult.reason || 'Saved scenario is incompatible with the current implementation.');
    return;
  }
  const invalidReasons = loadScenarioResult.validations.filter(item => !item.isValid).flatMap(item => item.reasons);
  if(invalidReasons.length) alert('Loaded scenario with validation issues:\n' + invalidReasons.join('\n'));
  renderApp();
}

function handleBattleChipInteraction(chipId){
  if(battleInteractionLocked()) return;
  const combatState = appState.combat;
  const battleUi = getBattleUiState();
  const clickedChipState = getCombatChipState(combatState, chipId);
  if(!clickedChipState) return;
  if(combatState.isBattleOver){
    battleUi.inspectedChipId = chipId;
    renderApp();
    return;
  }
  if(combatState.turnOwner !== 'player'){
    battleUi.inspectedChipId = chipId;
    renderApp();
    return;
  }
  const sourceChipId = battleUi.preview ? battleUi.preview.actingChipId : battleUi.focusedChipId;
  if(battleUi.preview){
    const preview = battleUi.preview;
    if(preview.chosenCandidateChipIds.includes(chipId)){
      const requirement = preview.chosenRequirement;
      const current = new Set(battleUi.chosenChipIds);
      if(current.has(chipId)) current.delete(chipId);
      else{
        if(requirement && requirement.kind === 'exactly' && current.size >= requirement.count) current.clear();
        if(requirement && requirement.kind === 'upTo' && current.size >= requirement.count){
          const first = Array.from(current)[0];
          current.delete(first);
        }
        current.add(chipId);
      }
      battleUi.chosenChipIds = Array.from(current);
      battleUi.preview = buildTruthfulPreview(combatState, 'player', preview.actingChipId, preview.targetChipId, battleUi.chosenChipIds);
      renderApp();
      return;
    }
    if(sourceChipId && preview.legalTargetChipIds.includes(chipId)){
      battleUi.chosenChipIds = [];
      battleUi.preview = buildTruthfulPreview(combatState, 'player', sourceChipId, chipId, []);
      renderApp();
      return;
    }
  }
  const usable = getUsableActiveChipIds(combatState, 'player');
  if(clickedChipState.sideKey === 'player' && usable.includes(chipId)){
    battleUi.focusedChipId = chipId;
    battleUi.preview = null;
    battleUi.chosenChipIds = [];
    battleUi.inspectedChipId = chipId;
    renderApp();
    return;
  }
  if(sourceChipId && getLegalTargetChipIds(combatState, 'player', sourceChipId).includes(chipId)){
    battleUi.preview = buildTruthfulPreview(combatState, 'player', sourceChipId, chipId, []);
    battleUi.chosenChipIds = [];
    battleUi.inspectedChipId = chipId;
    renderApp();
    return;
  }
  battleUi.inspectedChipId = chipId;
  renderApp();
}

  if(!combatState.isBattleOver){

  beginEnemyTurn(combatState);
  renderApp();
  const step = () => {
    if(combatState.isBattleOver){
      finalizePlaybackTurnCycle(combatState);
      renderApp();
      return;
    }
    const nextAction = chooseBestAiAction(combatState, combatState.enemyState.aiPresetId || 'aggressor');
    if(!nextAction){
      combatState.enemyState.committedPlan = null;
      finalizePlaybackTurnCycle(combatState);
      renderApp();
      return;
    }
    combatState.enemyState.committedPlan = buildCommittedEnemyPlanStep(nextAction);
    const playback = buildPlaybackReadoutFromAction(combatState, nextAction, 'Enemy action');
    setBattlePlaybackReadout(playback.title, playback.lines, 'enemy');
    renderApp();
    window.setTimeout(() => {
      resolveAction(combatState, nextAction);
      renderApp();
      if(combatState.isBattleOver || combatState.enemyState.currentEnergy <= 0 || !enumerateLegalActions(combatState, 'enemy').length){
        combatState.enemyState.committedPlan = null;
        window.setTimeout(() => { finalizePlaybackTurnCycle(combatState); renderApp(); }, 220);
        return;
      }
      window.setTimeout(step, 220);
    }, 220);
  };
  window.setTimeout(step, 180);
}
function endPlayerTurnWithPlayback(combatState){
  if(combatState.isBattleOver) return combatState;
  finalizeTurnCleanup(combatState, 'player');
  if(!combatState.isBattleOver) playEnemyTurnSequenceAsync(combatState);
  return combatState;
}

      event.preventDefault();
      spaceEl.classList.add('drop-target');
    });
    spaceEl.addEventListener('dragleave', () => spaceEl.classList.remove('drop-target'));

      event.preventDefault();
      spaceEl.classList.remove('drop-target');
      if(!isSideEditable(activeSideKey) || !appState.ui.dragPayload) return;

      if(appState.ui.dragPayload.kind === 'catalog'){
        result = createAndPlaceChipInstance(activeSideSetup, appState.ui.dragPayload.chipTypeId, spaceId);

        result = placeChipInstance(activeSideSetup, appState.ui.dragPayload.chipInstanceId, spaceId);
        if(result.ok) focusPlacedChip(activeSideKey, appState.ui.dragPayload.chipInstanceId);
      }
      clearDrag(); renderApp();
    });

      const occupiedChipInstanceId = activeSideSetup.placedLayoutBySpaceId[spaceId] || null;
      if(occupiedChipInstanceId){ focusPlacedChip(activeSideKey, occupiedChipInstanceId); renderApp(); return; }

      if(result.ok){ focusPlacedChip(activeSideKey, result.chipInstanceId); clearSelection(); }

  });

/* -------------------------------------------------------------------------- */
/* Invariant harness                                                          */
/* -------------------------------------------------------------------------- */
function assert(condition, message){
  if(!condition) throw new Error(message);
}
function createTestSideSetup(frameId, placements, aiPresetId){
  const sideSetup = createEmptySideSetup({ frameId, aiPresetId:aiPresetId ?? null });
  for(const placement of placements){
    const built = addBuiltInstanceToSide(sideSetup, placement.chipTypeId);
    sideSetup.placedLayoutBySpaceId[placement.spaceId] = built.chipInstanceId;
  }
  return sideSetup;
}
function runConstructionInvariantChecks(){
  const sideSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,2' },
    { chipTypeId:'cannon', spaceId:'1,2' }
  ]);
  const validation = validateSideSetup('player', sideSetup);
  assert(validation.isValid, 'Construction: expected simple setup to validate.');
  const illegalResult = createAndPlaceChipInstance(sideSetup, 'cannon', '0,0');
  assert(!illegalResult.ok, 'Construction: illegal placement should be rejected.');
}
function runGeometryInvariantChecks(){
  const sideSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,2' },
    { chipTypeId:'cannon', spaceId:'2,1' },
    { chipTypeId:'bulkhead', spaceId:'2,3' }
  ]);
  const enemyFrontier = getFrontierSpaceIds('player', sideSetup);
  assert(enemyFrontier.includes('2,1'), 'Geometry: forward-most occupied chip should be frontier when attacked by player.');
  assert(!enemyFrontier.includes('2,2'), 'Geometry: covered interior chip should not be frontier when blocked from the front.');

  const perLaneSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,3' },
    { chipTypeId:'cannon', spaceId:'2,1' },
    { chipTypeId:'bulkhead', spaceId:'0,2' }
  ]);
  const perLaneFrontier = getFrontierSpaceIds('player', perLaneSetup);
  assert(perLaneFrontier.includes('2,1'), 'Geometry: forward-most occupied chip in one lane should remain frontier.');
  assert(perLaneFrontier.includes('0,2'), 'Geometry: recessed lane front chip should still be frontier in its own lane.');
  assert(!perLaneFrontier.includes('2,3'), 'Geometry: deeper chip behind a lane front should not be frontier.');

  const holeSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,2' },
    { chipTypeId:'cannon', spaceId:'2,1' },
    { chipTypeId:'bulkhead', spaceId:'1,2' }
  ]);
  const combatSide = createCombatSideStateFromSetup('enemy', holeSetup, buildPowerStateForSide('enemy', holeSetup));
  const frontChipId = combatSide.chipsById[Object.keys(combatSide.chipsById).find(id => combatSide.chipsById[id].spaceId === '2,1')].chipInstanceId;
  combatSide.chipsById[frontChipId].hp = 0;
  combatSide.chipsById[frontChipId].isDisabled = true;
  const holeFrontier = getFrontierSpaceIds('player', combatSide);
  assert(holeFrontier.includes('2,2'), 'Geometry: chip behind a disabled frontier chip should become frontier through the breach.');
  assert(holeFrontier.includes('1,2'), 'Geometry: chip beside a disabled hole should become frontier from side exposure.');
  assert(holeFrontier.includes('3,1'), 'Geometry: any orthogonally adjacent occupied chip to a disabled hole should become frontier.');

  const emptyGapSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,2' },
    { chipTypeId:'cannon', spaceId:'2,3' },
    { chipTypeId:'bulkhead', spaceId:'1,2' }
  ]);
  const emptyGapFrontier = getFrontierSpaceIds('player', emptyGapSetup);
  assert(emptyGapFrontier.includes('2,2'), 'Geometry: forward-most occupied chip remains frontier even with empty spaces ahead.');
  assert(!emptyGapFrontier.includes('1,2'), 'Geometry: pre-existing empty legal spaces alone do not create side-burrow exposure.');
}
function runPowerInvariantChecks(){
  const sideSetup = createTestSideSetup('scout', [
    { chipTypeId:'scout-core', spaceId:'2,2' },
    { chipTypeId:'relay', spaceId:'2,1' },
    { chipTypeId:'relay', spaceId:'3,1' },
    { chipTypeId:'pylon-red', spaceId:'1,1' },
    { chipTypeId:'pylon-red', spaceId:'1,2' }
  ]);
  const powerState = buildPowerStateForSide('player', sideSetup);
  const coreId = sideSetup.placedLayoutBySpaceId['2,2'];
  const relayId = sideSetup.placedLayoutBySpaceId['3,1'];
  assert(getPowerColorsForChip(powerState, coreId).filter(color => color === 'red').length === 1, 'Power: duplicate same-color paths should not stack.');
  assert(getPowerColorsForChip(powerState, relayId).includes('red'), 'Power: relay propagation should carry red through the chain.');
}
function runBattleInitInvariantChecks(){
  const scenario = {
    scenarioId:'testScenario',
    name:'Test',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'1,2' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'1,2' }
    ], 'aggressor')
  };
  scenario.playerSetup.isLocked = true;
  scenario.enemySetup.isLocked = true;
  const snapshot = { scenario:deepClone(scenario), lockedAtVersion:APP_VERSION };
  const combatState = initializeBattleFromLockedSnapshot(snapshot);
  assert(Boolean(combatState), 'Battle init: expected combat state to be created.');
  prepareNextPlayerRound(combatState);
  assert(combatState.playerState.currentEnergy === 3, 'Battle init: scout core should seed 3 Energy at player turn start.');
  combatState.playerState.currentEnergy = 0;
  assert(snapshot.scenario.playerSetup !== combatState.playerState, 'Battle init: combat state should not reuse setup objects.');
}
function runActionInvariantChecks(){
  const scenario = {
    scenarioId:'testPreview',
    name:'Preview',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'1,2' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'bulkhead', spaceId:'2,1' }
    ], 'aggressor')
  };
  scenario.playerSetup.isLocked = true;
  scenario.enemySetup.isLocked = true;
  const combatState = initializeBattleFromLockedSnapshot({ scenario:deepClone(scenario), lockedAtVersion:APP_VERSION });
  prepareNextPlayerRound(combatState);
  const cannonId = Object.values(combatState.playerState.chipsById).find(chipState => chipState.chipTypeId === 'cannon').chipInstanceId;
  const legalTargets = getLegalTargetChipIds(combatState, 'player', cannonId);
  assert(legalTargets.length === 1, 'Actions: preview should expose exactly one legal frontier target in controlled scenario.');
  const targetChipId = legalTargets[0];
  const firstAction = buildLegalActionObject(combatState, 'player', cannonId, targetChipId, []);
  resolveAction(combatState, firstAction);
  assert(!getUsableActiveChipIds(combatState, 'player').includes(cannonId), 'Actions: active chip should not be usable twice in one turn.');
  const hpAfterFirstShot = getCombatChipState(combatState, targetChipId).hp;
  const illegalSecondShot = buildLegalActionObject(combatState, 'player', cannonId, targetChipId, []);
  resolveAction(combatState, illegalSecondShot);
  assert(getCombatChipState(combatState, targetChipId).hp === hpAfterFirstShot, 'Actions: illegal second activation should not resolve.');

  const pylonCombatState = initializeBattleFromLockedSnapshot({ scenario:deepClone({
    scenarioId:'testJammedPylon',
    name:'Jammed',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'saboteur', spaceId:'1,2' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'3,2' },
      { chipTypeId:'pylon-red', spaceId:'2,2' }
    ], 'aggressor')
  }), lockedAtVersion:APP_VERSION });
  prepareNextPlayerRound(pylonCombatState);
  const pylonState = Object.values(pylonCombatState.enemyState.chipsById).find(chipState => getChipDef(chipState.chipTypeId).isPylon);
  const jamResolution = buildEmptyResolution({ actingChipId:null, actionKind:'hostile', targetChipId:pylonState.chipInstanceId, chosenChipIds:[], affectedSpaceIds:[], affectedChipIds:[pylonState.chipInstanceId], hasRandomOutcome:false });
  applyStatusEffectToChip(pylonCombatState, pylonState, 'Jammed', 1, 'player', jamResolution);
  assert(getStatusAmount(pylonState, 'Jammed') === 0, 'Actions: Jammed should not apply to Pylons.');

  const overloadScenario = initializeBattleFromLockedSnapshot({ scenario:deepClone({
    scenarioId:'testOverload',
    name:'Overload',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'bulkhead', spaceId:'1,2' },
      { chipTypeId:'bulkhead', spaceId:'2,1' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' }
    ], 'aggressor')
  }), lockedAtVersion:APP_VERSION });
  const overloadedTarget = Object.values(overloadScenario.playerState.chipsById).find(chipState => chipState.spaceId === '1,2');
  const adjacentAlly = Object.values(overloadScenario.playerState.chipsById).find(chipState => chipState.spaceId === '2,2');
  const overloadResolution = buildEmptyResolution({ actingChipId:null, actionKind:'alliedSupport', targetChipId:overloadedTarget.chipInstanceId, chosenChipIds:[], affectedSpaceIds:[], affectedChipIds:[overloadedTarget.chipInstanceId], hasRandomOutcome:false });
  addStatusEntry(overloadedTarget, 'Overload', 1, { appliedBySideKey:'player' });
  applyStatusEffectToChip(overloadScenario, overloadedTarget, 'Mark', 1, 'player', overloadResolution);
  assert(getStatusAmount(adjacentAlly, 'Mark') === 1, 'Actions: Overload should copy non-damage atomic effects to orthogonally adjacent chips.');

  const projectedScenario = initializeBattleFromLockedSnapshot({ scenario:deepClone({
    scenarioId:'testProjectedResolution',
    name:'Projected',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'1,2' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'bulkhead', spaceId:'2,1' }
    ], 'aggressor')
  }), lockedAtVersion:APP_VERSION });
  prepareNextPlayerRound(projectedScenario);
  const projectedCannonId = Object.values(projectedScenario.playerState.chipsById).find(chipState => chipState.chipTypeId === 'cannon').chipInstanceId;
  const projectedTargetId = getLegalTargetChipIds(projectedScenario, 'player', projectedCannonId)[0];
  const projected = buildProjectedResolution(projectedScenario, 'player', projectedCannonId, projectedTargetId, []);
  assert(Array.isArray(projected.newlyExposedChipIds), 'Actions: projected resolution should expose newlyExposedChipIds.');
  assert(typeof projected.coreStillProtected === 'boolean', 'Actions: projected resolution should include coreStillProtected.');
}
function runAiInvariantChecks(){
  const scenario = {
    scenarioId:'testAI',
    name:'AI',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'bulkhead', spaceId:'0,2' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'1,2' }
    ], 'aggressor')
  };
  scenario.playerSetup.isLocked = true;
  scenario.enemySetup.isLocked = true;
  const combatState = initializeBattleFromLockedSnapshot({ scenario:deepClone(scenario), lockedAtVersion:APP_VERSION });
  beginEnemyTurn(combatState);
  const choice = chooseBestAiAction(combatState, 'aggressor');
  assert(Boolean(choice), 'AI: expected a legal AI action in controlled scenario.');
  const committed = buildCommittedEnemyPlanStep(scoreLegalAction(choice, getAiWeights('aggressor'), combatState, 'enemy'));
  assert(Array.isArray(committed.affectedSpaceIds), 'AI: committed plan should carry affected spaces.');
}

function runBattleTestShellInvariantChecks(){
  const scenario = {
    scenarioId:createScenarioId(),
    name:'Shell',
    notes:'',
    playerSetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'2,1' }
    ]),
    enemySetup:createTestSideSetup('scout', [
      { chipTypeId:'scout-core', spaceId:'2,2' },
      { chipTypeId:'cannon', spaceId:'2,1' }
    ], 'aggressor')
  };
  const serialized = serializeScenarioForSave(scenario);
  const compatibilityIssues = getSavedScenarioCompatibilityIssues(serialized);
  assert(compatibilityIssues.length === 0, 'Battle-test shell: serialized scenario should be compatible.');
  const loadedScenario = createScenarioFromSerializable(serialized);
  assert(!loadedScenario.playerSetup.isLocked && !loadedScenario.enemySetup.isLocked, 'Battle-test shell: loaded setups should not remain locked.');
  const snapshot = { scenario:deepClone(scenario), lockedAtVersion:APP_VERSION, mode:'battleTest' };
  const combatState = initializeBattleFromLockedSnapshot(snapshot);
  combatState.playerState.chipsById[Object.keys(combatState.playerState.chipsById)[0]].hp = 1;
  const freshCombatState = initializeBattleFromLockedSnapshot(snapshot);
  assert(freshCombatState.playerState.chipsById[Object.keys(freshCombatState.playerState.chipsById)[0]].hp !== 1, 'Battle-test shell: rematch should rebuild fresh combat state.');
}
function runAllInvariantChecks(){
  try{
    runConstructionInvariantChecks();
    runGeometryInvariantChecks();
    runPowerInvariantChecks();
    runBattleInitInvariantChecks();
    runActionInvariantChecks();
    runAiInvariantChecks();
    runBattleTestShellInvariantChecks();
    console.info('Chipcraft ' + APP_VERSION + ' invariant checks passed.');
  }catch(error){
    console.error('Chipcraft ' + APP_VERSION + ' invariant check failed:', error);
  }
}
